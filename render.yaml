services:
  - type: web
    name: opendo
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    disks:
      - name: opendo-data
        mountPath: /var/data/opendo
        sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_ENABLED
        value: "true"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_RESEARCH_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_WRITING_MODEL
        value: gemini-2.5-flash
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATA_DIR
        value: /var/data/opendo/data
      - key: UPLOADS_DIR
        value: /var/data/opendo/uploads
      - key: AUTO_SAVE_RESEARCH_RESULTS
        value: "true"
      - key: AUTO_MATCH_RESEARCH_RESULTS
        value: "true"
