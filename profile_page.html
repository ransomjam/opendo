<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opendo - Profile</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
      line-height: 1.5;
      color: #1f2937;
    }

    h1,
    h2 {
      margin-bottom: 8px;
    }

    section {
      border-top: 1px solid #d1d5db;
      padding: 20px 0;
    }

    label {
      display: block;
      margin: 10px 0 4px;
      font-weight: bold;
    }

    input,
    select,
    textarea,
    button {
      box-sizing: border-box;
      width: 100%;
      max-width: 520px;
      padding: 10px;
      font: inherit;
    }

    textarea {
      min-height: 84px;
    }

    button {
      width: auto;
      margin-top: 12px;
      cursor: pointer;
      background: #111827;
      color: white;
      border: 0;
      border-radius: 4px;
    }

    pre {
      white-space: pre-wrap;
      background: #f3f4f6;
      padding: 12px;
      border-radius: 4px;
      overflow-x: auto;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
  </style>
  <link rel="stylesheet" href="/assets/opendo.css" />
</head>
<body>
  <header>
    <h1>Opendo Profile</h1>
  </header>

  <main>
  <section class="card">
    <h2>Register</h2>
    <form id="registerForm">
      <label for="registerFullName">Full name</label>
      <input id="registerFullName" name="fullName" required>

      <label for="registerEmail">Email</label>
      <input id="registerEmail" name="email" type="email" required>

      <label for="registerPassword">Password</label>
      <input id="registerPassword" name="password" type="password" minlength="6" required>

      <button type="submit">Register</button>
    </form>
  </section>

  <section class="card">
    <h2>Login</h2>
    <form id="loginForm">
      <label for="loginEmail">Email</label>
      <input id="loginEmail" name="email" type="email" required>

      <label for="loginPassword">Password</label>
      <input id="loginPassword" name="password" type="password" required>

      <button type="submit">Login</button>
    </form>
  </section>

  <section class="card">
    <h2>Current User</h2>
    <button id="meButton" type="button">View current user</button>
    <button id="clearTokenButton" type="button">Clear token</button>
  </section>

  <section class="card">
    <h2>Profile</h2>
    <form id="profileForm">
      <div class="row">
        <div>
          <label for="country">Country</label>
          <input id="country" name="country">
        </div>
        <div>
          <label for="city">City</label>
          <input id="city" name="city">
        </div>
        <div>
          <label for="profession">Profession</label>
          <input id="profession" name="profession">
        </div>
        <div>
          <label for="educationLevel">Education level</label>
          <input id="educationLevel" name="educationLevel">
        </div>
      </div>

      <label for="skills">Skills, comma separated</label>
      <input id="skills" name="skills">

      <label for="businessType">Business type</label>
      <input id="businessType" name="businessType">

      <label for="businessStage">Business stage</label>
      <input id="businessStage" name="businessStage">

      <label for="sectorInterests">Sector interests, comma separated</label>
      <input id="sectorInterests" name="sectorInterests">

      <label for="fundingNeeds">Funding needs</label>
      <input id="fundingNeeds" name="fundingNeeds">

      <label>
        <input id="travelAvailable" name="travelAvailable" type="checkbox" style="width: auto;">
        Travel available
      </label>

      <label>
        <input id="passportAvailable" name="passportAvailable" type="checkbox" style="width: auto;">
        Passport available
      </label>

      <label>
        <input id="businessRegistered" name="businessRegistered" type="checkbox" style="width: auto;">
        Business registered
      </label>

      <label for="preferredOpportunityTypes">Preferred opportunity types, comma separated</label>
      <input id="preferredOpportunityTypes" name="preferredOpportunityTypes">

      <label for="bio">Bio</label>
      <textarea id="bio" name="bio"></textarea>

      <label for="portfolioLinks">Portfolio links, comma separated</label>
      <input id="portfolioLinks" name="portfolioLinks">

      <button type="submit">Save profile</button>
      <button id="loadProfileButton" type="button">Load profile</button>
    </form>
  </section>

  <section class="card">
    <h2>Documents</h2>
    <form id="documentForm">
      <label for="documentType">Document type</label>
      <select id="documentType" name="documentType" required>
        <option value="cv">CV</option>
        <option value="business_registration">Business registration</option>
        <option value="pitch_deck">Pitch deck</option>
        <option value="portfolio">Portfolio</option>
        <option value="passport">Passport</option>
        <option value="tax_certificate">Tax certificate</option>
        <option value="recommendation_letter">Recommendation letter</option>
        <option value="concept_note">Concept note</option>
        <option value="budget">Budget</option>
        <option value="academic_transcript">Academic transcript</option>
        <option value="other">Other</option>
      </select>

      <label for="documentFile">File</label>
      <input id="documentFile" name="file" type="file" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg" required>

      <button type="submit">Upload document</button>
      <button id="listDocumentsButton" type="button">List documents</button>
    </form>
  </section>

  <section class="card">
    <h2>Response</h2>
    <pre id="output">Ready.</pre>
  </section>

  </main>

  <script>
    const output = document.getElementById('output');

    function setOutput(value) {
      output.textContent = typeof value === 'string' ? value : JSON.stringify(value, null, 2);
    }

    function getToken() {
      return localStorage.getItem('opendoToken');
    }

    function setToken(token) {
      localStorage.setItem('opendoToken', token);
    }

    function authHeaders() {
      const token = getToken();
      return token ? { Authorization: `Bearer ${token}` } : {};
    }

    function commaList(value) {
      return value
        .split(',')
        .map(item => item.trim())
        .filter(Boolean);
    }

    async function readJsonResponse(response) {
      const data = await response.json();

      if (!response.ok) {
        throw data;
      }

      return data;
    }

    document.getElementById('registerForm').addEventListener('submit', async event => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(Object.fromEntries(form.entries()))
        });
        const data = await readJsonResponse(response);
        setToken(data.token);
        setOutput(data);
      } catch (error) {
        setOutput(error);
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async event => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(Object.fromEntries(form.entries()))
        });
        const data = await readJsonResponse(response);
        setToken(data.token);
        setOutput(data);
      } catch (error) {
        setOutput(error);
      }
    });

    document.getElementById('meButton').addEventListener('click', async () => {
      try {
        const response = await fetch('/api/auth/me', {
          headers: authHeaders()
        });
        setOutput(await readJsonResponse(response));
      } catch (error) {
        setOutput(error);
      }
    });

    document.getElementById('clearTokenButton').addEventListener('click', () => {
      localStorage.removeItem('opendoToken');
      setOutput('Token cleared.');
    });

    document.getElementById('loadProfileButton').addEventListener('click', async () => {
      try {
        const response = await fetch('/api/profile', {
          headers: authHeaders()
        });
        setOutput(await readJsonResponse(response));
      } catch (error) {
        setOutput(error);
      }
    });

    document.getElementById('profileForm').addEventListener('submit', async event => {
      event.preventDefault();
      const data = {
        country: document.getElementById('country').value,
        city: document.getElementById('city').value,
        profession: document.getElementById('profession').value,
        educationLevel: document.getElementById('educationLevel').value,
        skills: commaList(document.getElementById('skills').value),
        businessType: document.getElementById('businessType').value,
        businessStage: document.getElementById('businessStage').value,
        sectorInterests: commaList(document.getElementById('sectorInterests').value),
        fundingNeeds: document.getElementById('fundingNeeds').value,
        travelAvailable: document.getElementById('travelAvailable').checked,
        passportAvailable: document.getElementById('passportAvailable').checked,
        businessRegistered: document.getElementById('businessRegistered').checked,
        preferredOpportunityTypes: commaList(document.getElementById('preferredOpportunityTypes').value),
        bio: document.getElementById('bio').value,
        portfolioLinks: commaList(document.getElementById('portfolioLinks').value)
      };

      try {
        const response = await fetch('/api/profile', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            ...authHeaders()
          },
          body: JSON.stringify(data)
        });
        setOutput(await readJsonResponse(response));
      } catch (error) {
        setOutput(error);
      }
    });

    document.getElementById('documentForm').addEventListener('submit', async event => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);

      try {
        const response = await fetch('/api/documents', {
          method: 'POST',
          headers: authHeaders(),
          body: form
        });
        setOutput(await readJsonResponse(response));
      } catch (error) {
        setOutput(error);
      }
    });

    document.getElementById('listDocumentsButton').addEventListener('click', async () => {
      try {
        const response = await fetch('/api/documents', {
          headers: authHeaders()
        });
        setOutput(await readJsonResponse(response));
      } catch (error) {
        setOutput(error);
      }
    });
  </script>
</body>
</html>
